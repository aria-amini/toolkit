x-app-env: &app-env
  RAILWAY_ENVIRONMENT_NAME: docker
  DATABASE_URL: postgres://imdbgraph_user:imdbgraph_test@postgres:5432/imdbgraph_test

services:
  app:
    image: node:24-bookworm
    user: '${UID:-501}:${GID:-1000}'
    working_dir: /workspace
    command: >
      sh -lc "corepack enable && pnpm --filter imdbgraph dev --host 0.0.0.0"
    environment:
      <<: *app-env
    ports:
      - 3000:3000
    volumes:
      - ../..:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  populate:
    image: node:24-bookworm
    user: '${UID:-501}:${GID:-1000}'
    working_dir: /workspace
    command: >
      sh -lc "corepack enable && pnpm --filter imdbgraph exec tsx
      scripts/populate-db.ts"
    environment:
      <<: *app-env
    volumes:
      - ../..:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: imdbgraph_test
      POSTGRES_USER: imdbgraph_user
      POSTGRES_PASSWORD: imdbgraph_test
    ports:
      - 5434:5432
    volumes:
      - ./src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U imdbgraph_user -d imdbgraph_test']
      interval: 5s
      timeout: 5s
      retries: 10
