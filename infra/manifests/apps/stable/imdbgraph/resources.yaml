apiVersion: v1
kind: Namespace
metadata:
  name: imdbgraph
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: imdbgraph
  namespace: imdbgraph
spec:
  interval: 10m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: ./packages/infra/charts/app-release
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  values:
    app:
      name: imdbgraph
      namespace: imdbgraph
    image:
      repository: ghcr.io/aamini-stack/imdbgraph
      tag: latest
    host: imdbgraph.ariaamini.com
    envFromSecret: imdbgraph-secrets
