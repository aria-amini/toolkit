name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1

      - name: Build and publish config
        run: |
          vp run @aamini/config#build
          npm publish --access public --provenance
        working-directory: packages/config

      - name: Build and publish lib
        run: |
          vp run @aamini/lib#build
          npm publish --access public --provenance
        working-directory: packages/lib
