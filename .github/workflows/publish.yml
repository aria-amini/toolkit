name: Publish

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1

      - name: Bump package versions
        run: |
          npm version patch --no-git-tag-version
        working-directory: packages/config

      - name: Bump library version
        run: |
          npm version patch --no-git-tag-version
        working-directory: packages/lib

      - name: Commit and tag release
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          VERSION=$(node -p "require('./packages/config/package.json').version")
          git add packages/config/package.json packages/lib/package.json
          git commit -m "chore(release): v${VERSION}"
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"

      - name: Build and publish config
        run: |
          vp run @aamini/config#build
          npm publish --access public --provenance
        working-directory: packages/config

      - name: Build and publish lib
        run: |
          vp run @aamini/lib#build
          npm publish --access public --provenance
        working-directory: packages/lib
