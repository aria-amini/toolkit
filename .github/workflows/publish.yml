name: Publish

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1

      - name: Detect version changes
        id: versions
        run: |
          CONFIG_PREV=$(git show HEAD^1:packages/config/package.json | node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync(0,'utf8'));process.stdout.write(pkg.version)")
          CONFIG_CURR=$(node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('packages/config/package.json','utf8'));process.stdout.write(pkg.version)")
          LIB_PREV=$(git show HEAD^1:packages/lib/package.json | node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync(0,'utf8'));process.stdout.write(pkg.version)")
          LIB_CURR=$(node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('packages/lib/package.json','utf8'));process.stdout.write(pkg.version)")

          if [ "$CONFIG_CURR" != "$LIB_CURR" ]; then
            echo "::error::Package versions must match before publishing: @aamini/config=$CONFIG_CURR, @aamini/lib=$LIB_CURR"
            exit 1
          fi

          if [ "$CONFIG_PREV" = "$CONFIG_CURR" ] && [ "$LIB_PREV" = "$LIB_CURR" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Publish config
        if: steps.versions.outputs.changed == 'true'
        run: npm publish --access public --provenance
        working-directory: packages/config

      - name: Publish lib
        if: steps.versions.outputs.changed == 'true'
        run: npm publish --access public --provenance
        working-directory: packages/lib

      - name: Tag release
        if: steps.versions.outputs.changed == 'true'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          VERSION=$(node -p "require('./packages/config/package.json').version")
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin "v${VERSION}"
