packages:
  - packages/*
  - infra

onlyBuiltDependencies:
  - '@pulumi/command'
  - '@pulumi/kubernetes'
  - '@worawat/flux'
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
  '@voidzero-dev/vite-plus-test': latest
  '@voidzero-dev/vite-plus-core': latest
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
